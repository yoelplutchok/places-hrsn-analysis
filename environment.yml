name: hrsn-analysis
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas>=2.0
  - numpy>=1.24
  - scipy>=1.11
  - statsmodels>=0.14
  - scikit-learn>=1.3
  - geopandas>=0.14
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.18
  - pyarrow>=14.0          # For parquet files
  - requests>=2.31
  - pyyaml>=6.0
  - tqdm>=4.66
  - jupyter>=1.0
  - pip
  - pip:
    - censusdis>=1.0        # Census API wrapper
    - streamlit>=1.29       # Optional: dashboard
    - libpysal>=4.7         # Spatial weights/autocorrelation
    - esda>=2.5             # Exploratory spatial data analysis
    - mgwr>=2.2             # GWR (Enhancement 2)
    - factor-analyzer>=0.5  # EFA (Enhancement 3)
    - spreg>=1.3            # Spatial regression fallback
