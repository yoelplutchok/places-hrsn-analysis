# =============================================================================
# PLACES HRSN Analysis — Study Parameters
# =============================================================================

# Study Scope
study:
  title: "Which Social Needs Matter Most for Which Diseases?"
  geographic_level: "census_tract"
  country: "US"
  hrsn_states_count: 39  # HRSN measures only available in 39 states + DC

# --------------------------------------------------------------------------
# PLACES Measures — Exact MeasureId values from CDC PLACES 2024
# --------------------------------------------------------------------------

# EXPOSURES: Health-Related Social Needs (HRSN) — CategoryID: SOCLNEED
hrsn_measures:
  - id: LONELINESS
    name: "Loneliness/Social isolation"
    short: "Feeling lonely or socially isolated"
  - id: FOODSTAMP
    name: "Food stamps/SNAP"
    short: "Received food stamps in past 12 months"
  - id: FOODINSECU
    name: "Food insecurity"
    short: "Food insecurity in past 12 months"
  - id: HOUSINSECU
    name: "Housing insecurity"
    short: "Housing insecurity in past 12 months"
  - id: SHUTUTILITY
    name: "Utility shutoff threat"
    short: "Utility services threat in past 12 months"
  - id: LACKTRPT
    name: "Transportation barriers"
    short: "Lack of reliable transportation"
  - id: EMOTIONSPT
    name: "Lack of social support"
    short: "Lack of social and emotional support"

# OUTCOMES: Chronic Disease Prevalence — CategoryID: HLTHOUT
# Selecting 7 diseases with highest public health burden and policy relevance
# NOTE: KIDNEY (chronic kidney disease) not available in GIS-friendly tract data; dropped
outcome_measures:
  - id: DIABETES
    name: "Diabetes"
    short: "Diagnosed diabetes among adults"
  - id: DEPRESSION
    name: "Depression"
    short: "Depression among adults"
  - id: CASTHMA
    name: "Asthma"
    short: "Current asthma among adults"
  - id: OBESITY
    name: "Obesity"
    short: "Obesity among adults"
  - id: CHD
    name: "Coronary heart disease"
    short: "Coronary heart disease among adults"
  - id: COPD
    name: "COPD"
    short: "COPD among adults"
  - id: STROKE
    name: "Stroke"
    short: "Stroke among adults"

# ADDITIONAL OUTCOMES (secondary analysis)
secondary_outcomes:
  - id: BPHIGH
    name: "High blood pressure"
  - id: HIGHCHOL
    name: "High cholesterol"
  - id: MHLTH
    name: "Frequent mental distress"
  - id: PHLTH
    name: "Frequent physical distress"

# --------------------------------------------------------------------------
# Census ACS Variables — Demographic Covariates/Controls
# --------------------------------------------------------------------------
census:
  year: 2022
  survey: "acs5"  # 5-year estimates
  covariates:
    # Race/Ethnicity
    - variable: "pct_black"
      description: "Percent Black/African American alone"
    - variable: "pct_hispanic"
      description: "Percent Hispanic/Latino"
    - variable: "pct_white"
      description: "Percent White alone (any ethnicity, ACS B02001_002E)"
    # Socioeconomic
    - variable: "pct_poverty"
      description: "Percent below poverty level"
    - variable: "median_income"
      description: "Median household income"
    - variable: "pct_no_hs"
      description: "Percent without high school diploma (25+)"
    - variable: "pct_college"
      description: "Percent with bachelor's degree or higher (25+)"
    # Age
    - variable: "pct_65plus"
      description: "Percent aged 65 and older"
    - variable: "median_age"
      description: "Median age"
    # Urbanicity
    - variable: "total_population"
      description: "Total population (for weighting and exclusions)"

# --------------------------------------------------------------------------
# Analysis Parameters
# --------------------------------------------------------------------------
analysis:
  min_tract_population: 500          # Exclude very small tracts
  alpha: 0.05                        # Significance level
  standardize_coefficients: true     # Use z-scored variables for comparability
  cluster_se_level: "county"         # Cluster standard errors by county FIPS
  spatial_weights: "queen"           # For spatial autocorrelation checks

# --------------------------------------------------------------------------
# Visualization
# --------------------------------------------------------------------------
visualization:
  heatmap_cmap: "RdBu_r"            # Diverging colormap for association matrix
  positive_color: "#c0392b"          # Red for harmful associations
  negative_color: "#2980b9"          # Blue for protective associations
  neutral_color: "#ecf0f1"          # Light gray for null
  figure_dpi: 300
  figure_format: ["png", "pdf"]

# --------------------------------------------------------------------------
# Data Sources — Exact URLs
# --------------------------------------------------------------------------
data_sources:
  places_census_tract:
    url: "https://data.cdc.gov/api/views/cwsq-ngmh/rows.csv?accessType=DOWNLOAD"
    description: "CDC PLACES 2024/2025 release, census tract level, all measures"
    api_endpoint: "https://data.cdc.gov/resource/cwsq-ngmh.json"
    notes: "Large file (~500MB). Contains all measures for ~73,000 tracts."
  places_gis_friendly:
    url: "https://data.cdc.gov/api/views/yjkw-uj5s/rows.csv?accessType=DOWNLOAD"
    description: "GIS-friendly format (wide, one row per tract)"
    notes: "Easier to work with — already wide format with one column per measure."
  places_data_dictionary:
    url: "https://data.cdc.gov/resource/m35w-spkz.json"
    description: "PLACES measure definitions and metadata"
  census_api:
    base_url: "https://api.census.gov/data/2022/acs/acs5"
    documentation: "https://www.census.gov/programs-surveys/acs/data/data-via-api.html"
    notes: "Free API, key recommended but not required for moderate usage."
  tiger_shapefiles:
    url: "https://www2.census.gov/geo/tiger/TIGER2022/TRACT/"
    description: "Census tract boundary shapefiles for mapping"
    notes: "One file per state. Or use censusdis/geopandas to fetch directly."

# --------------------------------------------------------------------------
# Factor Analysis (Enhancement 3)
# --------------------------------------------------------------------------
factor_analysis:
  extraction_method: "ml"          # Maximum likelihood
  rotation: "promax"               # Oblique rotation (allows correlated factors)
  max_factors: 5                   # Test 1-5 factor solutions
  parallel_analysis_iterations: 1000
  factor_labels:
    - name: "Material Hardship"
      expected_measures: [foodstamp, foodinsecu, housinsecu, shututility, lacktrpt]
    - name: "Social Isolation"
      expected_measures: [emotionspt, loneliness]

# --------------------------------------------------------------------------
# BRFSS Individual-Level Analysis (Enhancement 1)
# --------------------------------------------------------------------------
brfss:
  year: 2023
  download_url: "https://www.cdc.gov/brfss/annual_data/2023/files/LLCP2023XPT.zip"
  xpt_filename: "LLCP2023.XPT"
  # Survey design variables
  weight_var: "_LLCPWT"
  strata_var: "_STSTR"
  psu_var: "_PSU"
  # HRSN variable mapping (BRFSS variable → recode logic)
  hrsn_variables:
    foodinsecu:
      brfss_var: "SDHFOOD1"
      recode: "always_usually"      # 1,2 → 1; 3,4,5 → 0; 7,9 → NaN
    foodstamp:
      brfss_var: "FOODSTMP"
      recode: "yes_no"              # 1 → 1; 2 → 0; 7,9 → NaN
    housinsecu:
      brfss_var: "SDHBILLS"
      recode: "yes_no"                 # Binary: 1=Yes, 2=No; 7,9 → NaN
    shututility:
      brfss_var: "SDHUTILS"
      recode: "yes_no"
    lacktrpt:
      brfss_var: "SDHTRNSP"
      recode: "yes_no"                 # Binary: 1=Yes, 2=No; 7,9 → NaN
    emotionspt:
      brfss_var: "EMTSUPRT"
      recode: "lack_support"        # 4,5 → 1 (sometimes/rarely/never); 1,2,3 → 0
    loneliness:
      brfss_var: "SDLONELY"
      recode: "always_usually"
  # Outcome variable mapping
  outcome_variables:
    diabetes:
      brfss_var: "DIABETE4"
      recode: "diabetes"            # 1 → 1; 2,3,4 → 0; 7,9 → NaN
    depression:
      brfss_var: "ADDEPEV3"
      recode: "yes_no"
    casthma:
      brfss_var: "ASTHMA3"
      recode: "yes_no"                 # Ever told asthma (full sample, not ASTHNOW which is sub-sample only)
    obesity:
      brfss_var: "_BMI5CAT"
      recode: "obesity"             # 4 → 1; 1,2,3 → 0
    chd:
      brfss_var: "CVDCRHD4"
      recode: "yes_no"
    copd:
      brfss_var: "CHCCOPD3"
      recode: "yes_no"
    stroke:
      brfss_var: "CVDSTRK3"
      recode: "yes_no"
  # Demographic covariates
  demographic_vars:
    age: "_AGEG5YR"
    race: "_RACE"
    income: "_INCOMG1"
    education: "_EDUCAG"
    sex: "SEXVAR"                     # SEX1 removed in 2023; SEXVAR is the replacement

# --------------------------------------------------------------------------
# Spatial Analysis (Enhancement 2)
# --------------------------------------------------------------------------
spatial:
  weights_type: "queen"
  row_standardize: true
  exclude_states: ["02", "15"]     # AK, HI — not contiguous
  projection: "EPSG:5070"          # Albers Equal Area for US
  gwr:
    subsample_size: 12000          # GWR is infeasible on 55K tracts
    stratify_by: "state_fips"
    top_associations: 3            # Number of top associations for GWR
  lisa:
    permutations: 999
    alpha: 0.05

# --------------------------------------------------------------------------
# Publication Target
# --------------------------------------------------------------------------
publication:
  journal: "Preventing Chronic Disease"
  url: "https://www.cdc.gov/pcd/for_authors/manuscript_requirements.htm"
  word_limit: 4000           # Excluding abstract, references, tables
  abstract_limit: 250        # Structured abstract
  max_tables: 6
  max_figures: 6
  reference_style: "AMA 11th edition"
  keywords_max: 10
